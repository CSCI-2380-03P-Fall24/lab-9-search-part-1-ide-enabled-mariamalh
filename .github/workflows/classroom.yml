name: Autograding Tests
'on':
- push
- repository_dispatch
permissions:
  checks: write
  actions: read
  contents: read
jobs:
  run-autograding-tests:
    runs-on: ubuntu-latest
    if: github.actor != 'github-classroom[bot]'
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: printArray
      id: printarray
      uses: classroom-resources/autograding-command-grader@v1
      with:
        test-name: printArray
        setup-command: ''
        command: make test try=printArray
        timeout: 10
        max-score: 20
    - name: seqSearch
      id: seqsearch
      uses: classroom-resources/autograding-command-grader@v1
      with:
        test-name: seqSearch
        setup-command: ''
        command: make test try=seqSearch
        timeout: 10
        max-score: 20
    - name: binSearch
      id: binsearch
      uses: classroom-resources/autograding-command-grader@v1
      with:
        test-name: binSearch
        setup-command: ''
        command: make test try=binSearch
        timeout: 10
        max-score: 20
    - name: binSearchR
      id: binsearchr
      uses: classroom-resources/autograding-command-grader@v1
      with:
        test-name: binSearchR
        setup-command: ''
        command: make test try=binSearchR
        timeout: 10
        max-score: 20
    - name: expSearch
      id: expsearch
      uses: classroom-resources/autograding-command-grader@v1
      with:
        test-name: expSearch
        setup-command: ''
        command: make test try=expSearch
        timeout: 10
        max-score: 20
    - name: Autograding Reporter
      uses: classroom-resources/autograding-grading-reporter@v1
      env:
        PRINTARRAY_RESULTS: "${{steps.printarray.outputs.result}}"
        SEQSEARCH_RESULTS: "${{steps.seqsearch.outputs.result}}"
        BINSEARCH_RESULTS: "${{steps.binsearch.outputs.result}}"
        BINSEARCHR_RESULTS: "${{steps.binsearchr.outputs.result}}"
        EXPSEARCH_RESULTS: "${{steps.expsearch.outputs.result}}"
      with:
        runners: printarray,seqsearch,binsearch,binsearchr,expsearch
